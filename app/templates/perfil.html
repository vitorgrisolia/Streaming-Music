{% extends 'base.html' %}
{% block content %}
<h1>Meu perfil</h1>
<form method="post" class="form">
  <label>Nome <input type="text" name="nome" value="{{ usuario.nome }}" required></label>
  <label>Email <input type="email" name="email" value="{{ usuario.email }}" required></label>
  <button type="submit">Salvar</button>
</form>
{% endblock %}
