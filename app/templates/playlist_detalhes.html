{% extends 'base.html' %}
{% block content %}
<h1>{{ playlist.nome }}</h1>
<p>{{ playlist.descricao }}</p>
{% if is_owner %}<a href="{{ url_for('playlist.editar', playlist_id=playlist.id) }}">Editar</a>{% endif %}
<ul>
{% for musica in playlist.musicas %}
  <li>{{ musica.titulo }}</li>
{% else %}
  <li>Sem músicas nesta playlist.</li>
{% endfor %}
</ul>
{% endblock %}
