{% extends 'base.html' %}
{% block title %}Criar Playlist | Streaming Music{% endblock %}
{% block content %}
<section class="page-header" data-animate>
  <p class="kicker">Nova colecao</p>
  <h1 class="page-title">Criar playlist</h1>
  <p class="page-subtitle">Defina nome, descricao e visibilidade para sua nova playlist.</p>
</section>

<section class="form-card" data-animate style="--delay: 80ms; max-width: 720px;">
  <form method="post" class="form form-stack">
    <label class="field">Nome da playlist
      <input type="text" name="nome" required>
    </label>

    <label class="field">Descricao
      <textarea name="descricao" placeholder="Opcional"></textarea>
    </label>

    <label class="checkbox-field">
      <input type="checkbox" name="publica">
      Tornar playlist publica
    </label>

    <div class="actions">
      <button type="submit">Criar playlist</button>
      <a class="btn btn-ghost" href="{{ url_for('playlist.minhas_playlists') }}">Cancelar</a>
    </div>
  </form>
</section>
{% endblock %}
