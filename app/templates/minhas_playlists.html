{% extends 'base.html' %}
{% block content %}
<h1>Minhas playlists</h1>
<a href="{{ url_for('playlist.criar') }}">Criar nova</a>
<ul>
{% for playlist in playlists %}
  <li><a href="{{ url_for('playlist.detalhes', playlist_id=playlist.id) }}">{{ playlist.nome }}</a></li>
{% else %}
  <li>Você ainda não possui playlists.</li>
{% endfor %}
</ul>
{% endblock %}
